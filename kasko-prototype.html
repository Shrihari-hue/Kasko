<style>
  :root { color-scheme: light; }
  html, body { background: #EDEAE3; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-feature-settings: "ss01","ss02","cv11","cv02","tnum";
  }
  .num { font-variant-numeric: tabular-nums; }

  .grain::before{
    content:"";
    position:absolute; inset:0;

    opacity:.35; mix-blend-mode:multiply; pointer-events:none;
  }

  /* Phone frame */
  .phone {
    width: 100%;
    max-width: 412px;
    height: 880px;
    background: #FAFAF7;
    border-radius: 44px;
    box-shadow:
      0 0 0 12px #0F1419,
      0 0 0 13px #2A2F38,
      0 24px 60px -10px rgba(15,20,25,.28),
      0 60px 120px -20px rgba(15,20,25,.18);
    position: relative;
    overflow: hidden;
  }
  .phone-notch {
    position:absolute; top: 10px; left: 50%; transform: translateX(-50%);
    width: 110px; height: 30px; background:#0F1419; border-radius: 999px; z-index: 60;
  }
  .scroll-shell { height: 100%; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding-bottom: 28px; }
  .scroll-shell::-webkit-scrollbar { display: none; }

  /* Status bar fake */
  .statusbar {
    height: 50px; padding: 0 28px;
    display:flex; align-items:flex-end; justify-content:space-between;
    padding-bottom: 10px;
    font-weight: 600; font-size: 14px;
  }

  /* Buttons */
  .btn {
    display:inline-flex; align-items:center; justify-content:center; gap:10px;
    padding: 18px 24px; border-radius: 999px; font-weight: 600; font-size: 15px;
    transition: transform .15s ease, background .2s ease, box-shadow .2s ease;
    user-select: none;
  }
  .btn:active { transform: scale(0.985); }
  .btn-primary { background:#0F1419; color:#FAFAF7; box-shadow: 0 8px 20px -8px rgba(15,20,25,.45); }

  .btn-forest { background:#1B5E3F; color:#FAFAF7; box-shadow: 0 8px 20px -8px rgba(27,94,63,.45); }
  .btn-forest:hover { background:#0E4329; }
  .btn-ghost { background:transparent; color:#0F1419; }
  .btn-soft { background:#F4F1EC; color:#0F1419; }

  /* Card surfaces */
  .card {
    background:#FFFFFF; border:1px solid #EFEBE3; border-radius: 22px;
    box-shadow: 0 1px 0 rgba(15,20,25,.02), 0 8px 24px -16px rgba(15,20,25,.08);
  }
  .card-flat { background:#FFFFFF; border:1px solid #EFEBE3; border-radius: 18px; }

  /* Input */
  .field {
    background:#F4F1EC; border:1.5px solid transparent; border-radius: 18px;
    padding: 18px 18px; font-size: 16px; width: 100%; color:#0F1419;
    transition: border-color .15s ease, background .15s ease;
  }
  .field:focus { outline: none; background:#FFFFFF; border-color:#0F1419; }
  .field::placeholder { color:#9CA3AF; }

  /* OTP boxes */
  .otp-box {
    width: 46px; height: 56px; border-radius: 14px; background:#F4F1EC;
    text-align:center; font-size: 22px; font-weight: 700; color:#0F1419;
    border: 1.5px solid transparent;
    font-variant-numeric: tabular-nums;
  }
  .otp-box:focus { outline:none; border-color:#0F1419; background:#FFFFFF; }

  /* Slider */
  input[type=range].kasko-slider {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 6px; background: #E8E4DC; border-radius:999px; outline:none;
  }
  input[type=range].kasko-slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 28px; height: 28px; border-radius:999px; background:#0F1419;
    border: 4px solid #FAFAF7;
    box-shadow: 0 4px 10px -2px rgba(15,20,25,.4);
    cursor: pointer;
  }
  input[type=range].kasko-slider::-moz-range-thumb {
    width: 28px; height: 28px; border-radius:999px; background:#0F1419;
    border: 4px solid #FAFAF7;
    box-shadow: 0 4px 10px -2px rgba(15,20,25,.4);
    cursor: pointer;
  }

  /* Toggle */
  .toggle { position: relative; width: 44px; height: 26px; background:#E8E4DC; border-radius:999px; transition: background .2s ease; cursor: pointer; }
  .toggle.on { background:#1B5E3F; }
  .toggle::after {
    content:""; position:absolute; top:3px; left:3px; width:20px; height:20px; background:#FFF;
    border-radius:999px; transition: transform .2s ease;
    box-shadow: 0 2px 4px rgba(15,20,25,.2);
  }
  .toggle.on::after { transform: translateX(18px); }

  /* Animations */
  @keyframes fadeInUp { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }
  .anim-in { animation: fadeInUp .35s cubic-bezier(.2,.7,.2,1) both; }
  @keyframes scaleIn { from { opacity:0; transform: scale(.85); } to { opacity:1; transform: scale(1); } }
  .pop-in { animation: scaleIn .45s cubic-bezier(.2,.9,.3,1.4) both; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { animation: spin 1s linear infinite; }
  @keyframes drawCheck { to { stroke-dashoffset: 0; } }
  .check-path { stroke-dasharray: 60; stroke-dashoffset: 60; animation: drawCheck .5s ease-out .15s forwards; }
  @keyframes pulseDot { 0%,100% { opacity:.4 } 50% { opacity:1 } }
  .pulse-dot { animation: pulseDot 1.2s ease-in-out infinite; }

  /* Sheet */
  .sheet-backdrop { background: rgba(15,20,25,.45); backdrop-filter: blur(4px); }
  @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .sheet { animation: sheetUp .35s cubic-bezier(.2,.8,.2,1); }

  .nav-item { display:flex; flex-direction:column; align-items:center; gap:3px; padding: 6px 14px; color:#9CA3AF; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
  .nav-item.active { color:#0F1419; }
  .nav-item.active .nav-dot { opacity: 1; }
  .nav-dot { width: 4px; height: 4px; border-radius:999px; background:#0F1419; opacity: 0; margin-top: 2px; }

  /* Eyebrow label */
  .eyebrow { text-transform: uppercase; letter-spacing: .14em; font-size: 11px; font-weight: 600; color:#6B7280; }

  /* Helpers */
  .divider { height: 1px; background: #EFEBE3; }
  .num-display { font-family: 'Fraunces', serif; font-weight: 500; letter-spacing: -.02em; }

/* 3. OTP */
function OtpScreen({ go, state }) {
  const [digits, setDigits] = useState(["","","","","",""]);
  const [timer, setTimer] = useState(45);
  const refs = useRef([]);

  useEffect(()=>{
    if (timer > 0) { const t = setTimeout(()=>setTimer(timer-1), 1000); return ()=>clearTimeout(t); }
  }, [timer]);

  const filled = digits.every(d => d !== "");
  useEffect(()=>{ if (filled) setTimeout(()=>go("consent"), 600); }, [filled]);

  const update = (i, v) => {
    const val = v.replace(/\D/g,"").slice(-1);
    const next = [...digits]; next[i] = val;
    setDigits(next);
    if (val && refs.current[i+1]) refs.current[i+1].focus();
  };
  const keyHandler = (i, e) => {
    if (e.key === "Backspace" && !digits[i] && refs.current[i-1]) refs.current[i-1].focus();
  };

  const masked = state.phone ? `+91 ${state.phone.slice(0,2)}··· ··${state.phone.slice(-2)}` : "+91 ··· ··· ··10";

  return (
    <PhoneFrame>
      <TopBar onBack={()=>go("login")} title="" />
      <div className="px-6 anim-in">
        <p className="eyebrow mb-3">Step 2 of 2</p>
        <h1 className="font-display text-[30px] leading-[1.1] tracking-tighter">Enter the 6-digit code we sent to {masked}</h1>

        <div className="mt-10 flex justify-between gap-2">
          {digits.map((d,i)=>(
            <input key={i}
              ref={el => refs.current[i] = el}
              className="otp-box"
              inputMode="numeric" maxLength="1"
              value={d}
              onChange={e=>update(i, e.target.value)}
              onKeyDown={e=>keyHandler(i,e)}
              autoFocus={i===0}
            />
          ))}
        </div>

        {filled && (
          <div className="mt-8 flex items-center justify-center gap-3 text-ink3 text-sm anim-in">
            <svg className="spin" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
            Verifying…
          </div>
        )}

        <div className="mt-10 text-center text-sm text-ink3">
          {timer > 0 ? <>Resend code in <span className="font-semibold text-ink num">{timer}s</span></>
                    : <button className="underline font-semibold text-ink">Resend code</button>}
        </div>

        <div className="mt-12 px-5 py-4 rounded-2xl bg-paperWarm flex items-start gap-3">
          <I.Info style={{ marginTop:2, flexShrink:0, color: "#404652" }}/>
          <p className="text-[12px] text-ink2 leading-relaxed">
            Use code <span className="font-mono font-semibold bg-white px-1.5 py-0.5 rounded">123456</span> to continue this demo.
          </p>
        </div>
      </div>
    </PhoneFrame>
  );
}

/* 5. KYC — 4 progressive steps */
function KycScreen({ go, state, set }) {
  const steps = [
    { key:"pan",     title:"PAN card",         desc:"For tax identity verification.",        Icon: I.Doc },
    { key:"aadhaar", title:"Aadhaar e-KYC",    desc:"Verify name & address via UIDAI.",      Icon: I.IdCard },
    { key:"selfie",  title:"Selfie",           desc:"A quick live photo to match your ID.",  Icon: I.Camera },
    { key:"bank",    title:"Bank account",     desc:"For instant disbursement & repayment.", Icon: I.Bank },
  ];
  const [done, setDone] = useState(state.kyc || {});
  const [active, setActive] = useState(null);

  const completed = steps.filter(s => done[s.key]).length;
  const allDone = completed === steps.length;

  function complete(key) {
    const next = { ...done, [key]: true };
    setDone(next); setActive(null);
    set({...state, kyc: next });
  }

  return (
    <PhoneFrame>
      <TopBar onBack={()=>go("consent")} title="Verify your identity" />
      <div className="px-6 anim-in">
        <p className="eyebrow">Required by RBI</p>

        {/* progress bar */}
        <div className="mt-6 h-1.5 rounded-full bg-line2 overflow-hidden">
          <div className="h-full bg-forest transition-all" style={{ width: `${(completed/4)*100}%` }}></div>
        </div>

        <div className="mt-6 space-y-3">
          {steps.map((s, i) => {
            const isDone = !!done[s.key];
            return (
              <button key={s.key}

                className={`w-full text-left card p-4 flex items-center gap-4 transition active:scale-[0.99] ${isDone ? "opacity-90" : ""}`}>

                </div>

        <button disabled={!allDone} onClick={()=>go("dashboard")} className="btn btn-primary w-full mt-8">
          {allDone ? <>Open my account <I.ArrowRight /></> : <>Complete all 4 steps</>}
        </button>

      {/* KYC step sheet */}

    </PhoneFrame>
  );
}

  );
}
function Section({ title, children }) {
  return (
    <div className="mt-5">
      <p className="eyebrow mb-2 px-1">{title}</p>
      <div className="card divide-y divide-line2">{children}</div>
    </div>
  );
}
function Row({ Icon, label, value, verified }) {
  return (
    <div className="p-4 flex items-center gap-3">
      <div className="w-9 h-9 rounded-xl bg-paperWarm flex items-center justify-center flex-shrink-0">
        <Icon />
      </div>
      <div className="flex-1 min-w-0">
        <p className="font-semibold text-[13px]">{label}</p>
        <p className="text-[12px] text-ink3 truncate">{value}</p>
      </div>
      {verified && (
        <div className="px-2 py-0.5 rounded-full bg-mint flex items-center gap-1">
          <I.Check style={{ width:10, height:10, color:"#1B5E3F"}}/>
          <span className="text-[10px] font-semibold text-forest">Verified</span>
        </div>
      )}
    </div>
  );
}
function RowToggle({ Icon, label, initial }) {
  const [on, setOn] = useState(!!initial);
  return (
    <div className="p-4 flex items-center gap-3">
      <div className="w-9 h-9 rounded-xl bg-paperWarm flex items-center justify-center flex-shrink-0"><Icon /></div>
      <p className="flex-1 font-semibold text-[13px]">{label}</p>
      <div onClick={()=>setOn(!on)} className={`toggle ${on?"on":""}`}></div>
    </div>
  );
}

/* 13. HELP */
function HelpScreen({ go }) {
  const topics = [
    "How does Kasko make money?",
    "What happens if I miss the due date?",
    "Why do you check my CIBIL score?",
    "When will my limit increase?",
    "How do I close my account?",
    "Is my data safe?",
  ];
  return (
    <PhoneFrame>
      <div className="pb-32">
        <TopBar title="Help & support"/>
        <div className="px-5">
          <div className="relative">
            <input className="field pl-11" placeholder="Search how-to articles…"/>
            <I.Search style={{ position:"absolute", left:16, top:18, color:"#9CA3AF"}}/>
          </div>

          <div className="grid grid-cols-3 gap-2 mt-5">
            <ContactCard Icon={I.Chat}  label="Chat"  sub="2 min wait" />
            <ContactCard Icon={I.Phone} label="Call"  sub="10am–7pm" />
            <ContactCard Icon={I.Mail}  label="Email" sub="< 24 hrs" />
          </div>

          <p className="eyebrow mt-7 mb-3 px-1">Popular questions</p>
          <div className="card divide-y divide-line2">
            {topics.map(t => (
              <button key={t} className="w-full p-4 flex items-center gap-3 text-left active:bg-paperWarm transition">
                <I.Help style={{ color:"#6B7280", flexShrink:0 }}/>
                <span className="flex-1 text-[14px] font-medium tracking-tight">{t}</span>
                <I.ChevronRight style={{ color:"#9CA3AF" }}/>
              </button>
            ))}
          </div>

          <div className="card p-5 mt-5">
            <p className="eyebrow mb-2">Grievance redressal</p>
            <p className="text-[13px] text-ink2 leading-relaxed">
              <span className="font-semibold">Anjali Sharma</span>, Nodal Officer<br/>
              grievance@kasko.in · 1800-XXX-XXXX
            </p>
            <p className="text-[11px] text-ink3 mt-3 leading-relaxed">
              If unresolved within 30 days, you may escalate to the RBI Integrated Ombudsman at <u>cms.rbi.org.in</u>.
            </p>
          </div>
        </div>
      </div>
      <BottomNav active="help" go={go}/>
    </PhoneFrame>
  );
}
function ContactCard({ Icon, label, sub }) {
  return (
    <button className="card-flat p-4 flex flex-col items-center gap-2 active:scale-95 transition">
      <div className="w-10 h-10 rounded-xl bg-ink text-paper flex items-center justify-center"><Icon /></div>
      <span className="text-[13px] font-semibold">{label}</span>
      <span className="text-[10px] text-ink3">{sub}</span>
    </button>
  );
}

/* ═══════════════════════════════════════════
   ROUTER + OUTER CHROME
   ═══════════════════════════════════════════ */

const SCREENS = {
  splash:          { Comp: SplashScreen,        name: "Splash" },
  login:           { Comp: LoginScreen,         name: "Sign in" },
  otp:             { Comp: OtpScreen,           name: "OTP" },
  consent:         { Comp: ConsentScreen,       name: "CIBIL consent" },
  kyc:             { Comp: KycScreen,           name: "KYC" },
  dashboard:       { Comp: DashboardScreen,     name: "Dashboard" },
  borrow:          { Comp: BorrowScreen,        name: "Borrow" },
  "borrow-success":{ Comp: BorrowSuccessScreen, name: "Disbursed" },
  repayment:       { Comp: RepaymentScreen,     name: "Repayment" },
  "repay-success": { Comp: RepaySuccessScreen,  name: "Repaid" },
  history:         { Comp: HistoryScreen,       name: "Activity" },
  profile:         { Comp: ProfileScreen,       name: "Profile" },
  help:            { Comp: HelpScreen,          name: "Help" },
};

function App() {
  const [screen, setScreen] = useState("splash");
  const [state, setState] = useState({
    phone: "9876543210",
    limit: 1000,
    outstanding: 0,
    kyc: {},
  });
  const [navOpen, setNavOpen] = useState(false);
  const go = (s) => { setScreen(s); setNavOpen(false); };
  const Comp = SCREENS[screen].Comp;

  return (
    <div className="min-h-screen w-full flex flex-col items-center" style={{ background: "#EDEAE3" }}>
      {/* Outer chrome */}
      <div className="w-full max-w-6xl px-6 pt-8 pb-4 flex items-center justify-between">
        <div className="flex items-center gap-3">
          <div className="w-9 h-9 rounded-xl bg-ink text-paper flex items-center justify-center font-display text-[20px] font-medium">K</div>
          <div>
            <p className="font-display text-[20px] tracking-tighter leading-none">Kasko</p>
            <p className="text-[11px] text-ink3 mt-0.5">Interactive prototype · v1</p>
          </div>
        </div>
        <button onClick={()=>setNavOpen(!navOpen)} className="px-4 py-2 rounded-full bg-ink text-paper text-[13px] font-semibold flex items-center gap-2">
          {SCREENS[screen].name} <I.ChevronDown style={{ width:14, height:14 }}/>
        </button>
      </div>

      {/* Screen jumper */}
      {navOpen && (
        <div className="w-full max-w-6xl px-6 mb-4">
          <div className="card p-4">
            <p className="eyebrow mb-3">Jump to a screen</p>
            <div className="flex flex-wrap gap-2">
              {Object.entries(SCREENS).map(([key, { name }]) => (
                <button key={key} onClick={()=>go(key)}
                  className={`px-3.5 py-2 rounded-full text-[12px] font-semibold transition border
                    ${screen===key ? "bg-ink text-paper border-ink" : "bg-paperWarm text-ink2 border-transparent"}`}>
                  {name}
                </button>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* Phone */}
      <div className="py-6 px-6 w-full flex items-center justify-center flex-1">
        <Comp go={go} state={state} set={setState} />
      </div>

      {/* Footer chrome */}
      <div className="w-full max-w-6xl px-6 pb-6 text-center">
        <p className="text-[10px] text-ink3 leading-relaxed">
          For design review only. Demo data — not connected to real banking or CIBIL.<br/>
          Use OTP <span className="font-mono font-semibold">123456</span> and tap "Verify" through each KYC step.
        </p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
